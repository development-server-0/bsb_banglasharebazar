<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BSB - বাংলা শেয়ার বাজার</title>
    <style>
        /* --- PREMIUM & RESPONSIVE CSS3 STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(180deg, #ffffff 0%, #f0f4f8 100%);
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
            touch-action: pan-y;
        }

        /* Hardware Accelerated Background */
        .bg-icon {
            position: absolute;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            will-change: transform, opacity;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translate3d(0, 110vh, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translate3d(0, -10vh, 0) rotate(360deg); opacity: 0; }
        }

        /* Main UI Container */
        .container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            padding: 4vh 24px calc(20px + env(safe-area-inset-bottom)) 24px;
            text-align: center;
        }

        /* Top: Header */
        .header { flex-shrink: 0; }
        .header img {
            width: clamp(100px, 30vw, 140px);
            height: auto;
            margin-bottom: 2vh;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .header h1 {
            color: #0d47a1;
            font-size: clamp(22px, 6vw, 26px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Middle: Content Section */
        .content {
            flex: 1 1 auto;
            min-height: 0; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            padding: 2vh 0;
        }
        
        .main-text {
            font-size: clamp(17px, 5vw, 20px);
            color: #2c3e50;
            line-height: 1.5;
            font-weight: 600;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
            will-change: transform, opacity;
        }

        /* Document Thumbnail Card (Screen 4) */
        .doc-card {
            display: none; 
            width: 110px;
            height: 140px;
            margin-bottom: 2vh;
            background: white;
            border: 3px solid #e3f2fd;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(25, 118, 210, 0.15);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            flex-shrink: 0;
        }
        .doc-card:active { transform: scale(0.92); }
        .doc-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        .doc-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 6px 0;
            font-weight: bold;
            backdrop-filter: blur(2px);
        }

        /* Bottom: Footer */
        .footer {
            flex-shrink: 0; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2vh; 
        }

        /* Pagination Dots */
        .dots-container { display: flex; gap: 8px; }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #cfd8dc;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .dot.active {
            width: 24px;
            background-color: #1976d2;
            border-radius: 10px;
        }

        /* Navigation Buttons */
        .btn-container {
            height: 65px; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .next-btn {
            background: #1976d2;
            border: none;
            border-radius: 50%;
            width: clamp(55px, 15vw, 65px);
            height: clamp(55px, 15vw, 65px);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(25,118,210,0.3);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .next-btn:active { transform: scale(0.9); background: #1565c0; }
        .next-btn svg { fill: white; width: 30px; height: 30px; }

        .start-btn {
            display: none; 
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
            border: none;
            padding: 16px 0;
            border-radius: 30px;
            font-size: clamp(18px, 5vw, 20px);
            font-weight: bold;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(46,125,50,0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.96); }

        /* Modal styling */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .real-document {
            width: 100%;
            max-height: 55vh;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #eeeeee;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="container" id="swipe-zone">
        <div class="header">
            <img src="logo.png" alt="BSB Logo" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iIzFhMjM3ZSIgZD0iTTE2LDZMMTguMjksOC4yOUwxMy40MSwxMy4xN0w5LjQxLDkuMTdMMiwxNi41OUwzLjQxLDE4TDkuNDEsMTJMMTMuNDEsMTZMMTkuNzEsOS43MUwyMiwxMlY2SDE2WiIgLz48L3N2Zz4='">
            <h1>বাংলা শেয়ার বাজার</h1>
        </div>

        <div class="content">
            <div class="doc-card" id="doc-card" onclick="showModal()">
                <img src="doc-full.png" class="doc-thumbnail" alt="Govt Document" onerror="this.style.display='none'">
                <div class="doc-overlay">Tap to View</div>
            </div>
            
            <p class="main-text" id="main-text"></p>
        </div>

        <div class="footer">
            <div class="dots-container" id="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="btn-container">
                <button class="next-btn" id="next-btn" onclick="nextScreen()">
                    <svg viewBox="0 0 24 24"><path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" /></svg>
                </button>
                <button class="start-btn" id="start-btn" onclick="finishOnboarding()">শুরু করুন</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal" onclick="handleOutsideClick(event)">
        <div class="modal-content" id="modal-box">
            <img src="doc-full.png" class="real-document" alt="Government Document" onerror="this.style.display='none'">
            <h2 style="color: #0d47a1; font-size: 22px; margin-bottom: 5px;">Government Approved</h2>
            <p style="color: #455a64; font-size: 15px; margin-bottom: 15px;">বাংলাদেশ সরকার কর্তৃক অনুমোদিত</p>
            <p style="color: #9e9e9e; font-size: 12px; margin-top: 10px;">বন্ধ করতে বাইরে ট্যাপ করুন</p>
        </div>
    </div>

    <script>
        const screenData = [
            "বর্তমানে বাংলাদেশে 4 লক্ষ্য অনলাইন ব্যবসা রয়েছে, তাদের ব্যবসার শেয়ার কিনে আপনিও লাভবান হতে পারেন",
            "জি আমাদের মাধ্যমে খুব সহজেই শেয়ার ক্রয় এবং বিক্রয় করতে পারবেন",
            "আপনার ক্রয় করা শেয়ারের পরিমান দৈনিক কতটুকু বৃদ্ধি পাচ্ছে , আপনার মোট লাভ এবং মোট শেয়ারের লাইভ পরিমান দেখতে পারবেন",
            "আমাদের সার্ভিস গুলো বাংলাদেশ সরকার থেকে অনুমোদিত",
            "আপনার ক্রয় করা একটি শেয়ার বদলে দিতে পারে আপনার বর্তমান"
        ];
        
        let currentIndex = 0;
        let modalTimeout;

        document.getElementById('main-text').innerText = screenData[currentIndex];

        function nextScreen() {
            if (currentIndex < screenData.length - 1) {
                currentIndex++;
                updateUI(1);
            }
        }

        function prevScreen() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI(-1);
            }
        }

        function updateUI(direction) {
            const textBox = document.getElementById('main-text');
            const dots = document.querySelectorAll('.dot');
            
            textBox.style.transform = `translateX(${direction * -30}px)`;
            textBox.style.opacity = 0;
            
            setTimeout(() => {
                textBox.innerText = screenData[currentIndex];
                textBox.style.transform = `translateX(${direction * 30}px)`;
                void textBox.offsetWidth;
                textBox.style.transform = `translateX(0)`;
                textBox.style.opacity = 1;
            }, 200);
            
            document.getElementById('doc-card').style.display = (currentIndex === 3) ? 'block' : 'none';
            
            dots.forEach((dot, index) => {
                dot.className = index === currentIndex ? 'dot active' : 'dot';
            });
            
            if (currentIndex === screenData.length - 1) {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            } else {
                document.getElementById('next-btn').style.display = 'flex';
                document.getElementById('start-btn').style.display = 'none';
            }
        }

        // SWIPE GESTURE DETECTION 
        let touchstartX = 0;
        let touchendX = 0;
        const swipeZone = document.getElementById('swipe-zone');

        swipeZone.addEventListener('touchstart', function(event) {
            touchstartX = event.changedTouches[0].screenX;
        }, {passive: true});

        swipeZone.addEventListener('touchend', function(event) {
            touchendX = event.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50; 
            if (touchstartX - touchendX > swipeThreshold) nextScreen(); 
            if (touchendX - touchstartX > swipeThreshold) prevScreen(); 
        }

        function showModal() {
            const modal = document.getElementById('modal');
            const modalBox = document.getElementById('modal-box');
            modal.style.display = 'flex';
            void modal.offsetWidth; 
            modal.style.opacity = 1;
            modalBox.style.transform = 'translateY(0) scale(1)';

            clearTimeout(modalTimeout);
            modalTimeout = setTimeout(() => { closeModal(); }, 6000);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalBox = document.getElementById('modal-box');
            modal.style.opacity = 0;
            modalBox.style.transform = 'translateY(30px) scale(0.95)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
            clearTimeout(modalTimeout);
        }

        function handleOutsideClick(event) {
            const modalBox = document.getElementById('modal-box');
            if (!modalBox.contains(event.target)) closeModal();
        }

        // THIS ROUTES TO YOUR NEW AUTH FILE
        function finishOnboarding() {
            window.location.href = "auth.html";
        }

        const bgLayer = document.getElementById('bg-layer');
        const colorfulIcons = ['💰', '📈', '🚀', '💼', '💵', '📊', '🤝', '🏦'];

        for(let i = 0; i < 15; i++) {
            let iconDiv = document.createElement('div');
            iconDiv.className = 'bg-icon';
            iconDiv.innerText = colorfulIcons[Math.floor(Math.random() * colorfulIcons.length)];
            iconDiv.style.left = Math.random() * 95 + 'vw';
            
            let speed = Math.random() * 12 + 15;
            iconDiv.style.animationDuration = speed + 's';
            iconDiv.style.animationDelay = (Math.random() * -20) + 's';
            iconDiv.style.fontSize = (Math.random() * 20 + 20) + 'px';
            
            bgLayer.appendChild(iconDiv);
        }
    </script>
</body>
</html>
