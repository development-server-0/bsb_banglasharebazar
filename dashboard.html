<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BSB - Live Dashboard</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        /* --- ENABLE TEXT SELECTION & ORIGINAL UI --- */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: system-ui, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: text !important; 
            -webkit-user-select: text !important;
        }
        
        body { background: #f4f7f9; min-height: 100dvh; padding-bottom: 100px; color: #263238; }
        
        .top-nav { background: #ffffff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15 rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 100; }
        .user-info h2 { font-size: 13px; color: #90a4ae; font-weight: 500; }
        .user-info p { font-size: 16px; font-weight: bold; color: #1a237e; }
        .profile-btn { width: 35px; height: 35px; background: #e3f2fd; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1976d2; font-weight: bold; text-decoration: none; border: 1px solid #bbdefb; }
        
        .balance-card { background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%); margin: 20px; padding: 25px; border-radius: 24px; color: white; box-shadow: 0 10px 25px rgba(25, 118, 210, 0.2); }
        .balance-card span { font-size: 13px; opacity: 0.85; font-weight: bold; }
        .balance-card h1 { font-size: 34px; margin-top: 5px; font-weight: 800; }
        
        .section-title { margin: 25px 20px 15px 20px; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 18px; background: #1976d2; border-radius: 10px; }
        
        .business-list { padding: 0 20px; display: grid; gap: 18px; }
        .biz-item { background: white; padding: 20px; border-radius: 22px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #edf2f7; transition: 0.2s; }
        .biz-item:active { transform: scale(0.98); }
        .biz-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .biz-name h3 { font-size: 17px; color: #1a237e; font-weight: 700; margin-bottom: 2px; }
        .biz-name p { font-size: 12px; color: #90a4ae; }
        
        .biz-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; background: #f8f9fb; padding: 12px; border-radius: 14px; text-align: center; border: 1px solid #f1f3f5; }
        .stat-box label { display: block; font-size: 10px; color: #78909c; margin-bottom: 4px; font-weight: 600; }
        .stat-box p { font-size: 13px; font-weight: 800; color: #455a64; }
        .border-left { border-left: 1px solid #e0e0e0; }
        
        .biz-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding-top: 15px; border-top: 1px dashed #e0e0e0; }
        .current-price { font-size: 22px; font-weight: 900; color: #2e7d32; transition: all 0.2s ease; }
        .details-btn { background: #1976d2; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; font-size: 13px; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #f0f0f0; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { text-align: center; color: #b0bec5; font-size: 11px; text-decoration: none; flex: 1; }
        .nav-item.active { color: #1976d2; }
        .nav-item svg { width: 26px; height: 26px; margin-bottom: 4px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="user-info"><h2>স্বাগতম 👋</h2><p id="display-user">লোড হচ্ছে...</p></div>
        <a href="profile.html" class="profile-btn" id="avatar-initial">...</a>
    </div>

    <div class="balance-card">
        <span>লাইভ ট্রেড ব্যালেন্স (Live Trade Balance)</span>
        <h1 id="display-balance">৳ 0.00</h1>
    </div>

    <h2 class="section-title">বিনিয়োগের সুযোগ</h2>
    
    <div class="business-list" id="biz-container">
        <p style="text-align:center; color:#90a4ae; font-size: 14px; padding: 40px;">মার্কেট ডেটা লোড হচ্ছে...</p>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg> হোম</a>
        <a href="portfolio.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21,18V19C21,20.1 20.1,21 19,21H5C3.9,21 3,20.1 3,19V5C3,3.9 3.9,3 5,3H19C20.1,3 21,3.9 21,5V6H12C10.9,6 10,6.9 10,8V16C10,17.1 10.9,18 12,18H21M12,16H22V8H12V16M16,13.5C15.17,13.5 14.5,12.83 14.5,12C14.5,11.17 15.17,10.5 16,10.5C16.83,10.5 17.5,11.17 17.5,12C17.5,12.83 16.83,13.5 16,13.5Z"/></svg> পোর্টফোলিও</a>
        <a href="wallet.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21,18V19A2,2 0 0,1 19,21H5C3.89,21 3,20.1 3,19V5A2,2 0 0,1 5,3H19A2,2 0 0,1 21,5V11H13V13H21V18M23,13H15V11H23V13Z"/></svg> ওয়ালেট</a>
        <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg> প্রোফাইল</a>
    </div>

    <script>
        const S_URL = 'https://jdjgqdodhpcthhxbxhrt.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkamdxZG9kaHBjdGhoeGJ4aHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTE0MDQsImV4cCI6MjA5MDQ2NzQwNH0.w7UXHHmNMBBmQwj0A34j-tHMMmQIbumkqvX99H8yoyg';
        const supabase = window.supabase.createClient(S_URL, S_KEY);
        let SESSION_USER = localStorage.getItem('BSB_SESSION'); 

        window.onload = async () => {
            if (!SESSION_USER) {
                window.location.replace("index.html"); 
                return;
            }

            const { data: userExists } = await supabase.from('profiles').select('user_id').eq('user_id', SESSION_USER).maybeSingle();
            if(!userExists) {
                localStorage.clear();
                window.location.replace("index.html");
                return;
            }
            
            await loadUserProfile();
            await updateLiveTradeBalance();
            await loadMarketData();
            
            setInterval(fetchLivePricesOnly, 3000);
            setInterval(updateLiveTradeBalance, 10000); 
        };

        async function loadUserProfile() {
            const { data, error } = await supabase.from('profiles').select('username').eq('user_id', SESSION_USER).single();
            if(!error && data && data.username) {
                document.getElementById('display-user').innerText = data.username;
                document.getElementById('avatar-initial').innerText = data.username[0].toUpperCase();
            }
        }

        async function updateLiveTradeBalance() {
            if(!SESSION_USER) return;

            // 1. Get Liquid Cash (Base Balance + Approved Wallet Txs + Realized Trades)
            const { data: profile } = await supabase.from('profiles').select('current_balance').eq('user_id', SESSION_USER).single();
            let cash = profile ? parseFloat(profile.current_balance) : 0;

            const { data: wallet } = await supabase.from('wallet_tx').select('*').eq('user_id', SESSION_USER).eq('status', 'APPROVED');
            wallet?.forEach(w => w.type === 'DEPOSIT' ? cash += w.amount : cash -= (w.amount + w.fee));

            const { data: trades } = await supabase.from('trades').select('*').eq('user_id', SESSION_USER);
            const { data: biz } = await supabase.from('businesses').select('name, live_price');
            const priceMap = {}; biz?.forEach(b => priceMap[b.name] = b.live_price);

            let currentStockValue = 0;
            let holdings = {};

            trades?.forEach(t => {
                const fee = t.platform_fee || (t.total_amount * 0.005);
                if(t.type === 'BUY') {
                    cash -= (t.total_amount + fee);
                    holdings[t.business_name] = (holdings[t.business_name] || 0) + t.shares;
                } else {
                    cash += (t.total_amount - fee);
                    holdings[t.business_name] = (holdings[t.business_name] || 0) - t.shares;
                }
            });

            // 2. Add Live Value of Active Stocks
            for(let name in holdings) {
                if(holdings[name] > 0) {
                    currentStockValue += (holdings[name] * (priceMap[name] || 0));
                }
            }

            const finalBal = cash + currentStockValue;
            document.getElementById('display-balance').innerText = "৳ " + finalBal.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        async function loadMarketData() {
            const { data } = await supabase.from('businesses').select('*').order('name');
            const container = document.getElementById('biz-container');
            if(!data || data.length === 0) return;
            
            container.innerHTML = data.map(biz => {
                const currentPrice = biz.live_price || biz.start_price;
                const changeVal = currentPrice - biz.close_price;
                const changeColor = changeVal >= 0 ? '#2e7d32' : '#d32f2f';
                const changeIcon = changeVal >= 0 ? '▲' : '▼';
                
                return `
                    <div class="biz-item">
                        <div class="biz-header">
                            <div class="biz-name"><h3>${biz.name}</h3><p>ক্যাটাগরি: ${biz.category}</p></div>
                        </div>
                        <div class="biz-stats">
                            <div class="stat-box"><label>আজকের শুরু</label><p>৳ ${biz.start_price.toFixed(2)}</p></div>
                            <div class="stat-box border-left"><label>আজকের শেষ</label><p>৳ ${biz.close_price.toFixed(2)}</p></div>
                            <div class="stat-box border-left"><label>পরিবর্তন</label><p style="color:${changeColor}">${changeIcon}</p></div>
                        </div>
                        <div class="biz-footer">
                            <div><label style="font-size:10px;color:#90a4ae;display:block;">লাইভ প্রাইস</label>
                            <span class="current-price" id="price-${biz.id}">৳ ${currentPrice.toFixed(2)}</span></div>
                            <button class="details-btn" onclick="location.href='details.html?name=${encodeURIComponent(biz.name)}'">বিস্তারিত</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchLivePricesOnly() {
            const { data } = await supabase.from('businesses').select('id, live_price');
            data?.forEach(biz => {
                const el = document.getElementById(`price-${biz.id}`);
                if(el) {
                    const oldP = parseFloat(el.innerText.replace('৳ ', ''));
                    const newP = biz.live_price || oldP;
                    if(newP !== oldP) {
                        el.innerText = "৳ " + newP.toFixed(2);
                        el.style.color = newP > oldP ? '#43a047' : '#d32f2f';
                        setTimeout(() => el.style.color = '#2e7d32', 800);
                    }
                }
            });
        }
    </script>
</body>
</html>
